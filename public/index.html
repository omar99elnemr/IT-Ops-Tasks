<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Ops Control Deck</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-0: #0a1624;
      --bg-1: #10253b;
      --card: rgba(255, 255, 255, 0.88);
      --ink: #0f2437;
      --muted: #4b6477;
      --accent: #ff6b35;
      --line: #c7d7e5;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at 10% 10%, rgba(14, 165, 164, 0.24), transparent 40%),
        radial-gradient(circle at 85% 20%, rgba(255, 107, 53, 0.24), transparent 35%),
        linear-gradient(145deg, var(--bg-0), var(--bg-1) 55%, #15314d);
      padding: 16px;
    }

    h1, h2, h3 { margin: 0; }

    .auth-shell, .deck-shell {
      max-width: 1100px;
      margin: 0 auto;
    }

    .auth-card, .panel {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      box-shadow: 0 16px 30px rgba(3, 12, 19, 0.28);
    }

    .auth-card {
      max-width: 620px;
      margin: 5vh auto 0;
      padding: 24px;
    }

    .subtitle { color: var(--muted); margin: 10px 0 14px; }

    .segmented {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .segmented button {
      border: none;
      padding: 10px;
      background: #f3f8fc;
      cursor: pointer;
      font-weight: 600;
      color: var(--muted);
    }

    .segmented button.active {
      background: linear-gradient(135deg, var(--accent), #ff8a5f);
      color: #fff;
    }

    .form-stack { display: grid; gap: 10px; }
    .two-col { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

    input, select, textarea, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 11px 12px;
      font-family: inherit;
      font-size: 14px;
    }

    textarea { font-family: 'IBM Plex Mono', monospace; }

    button {
      background: linear-gradient(135deg, #0ea5a4, #0b7d87);
      color: #fff;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button.outline {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 10px 0 14px;
      color: #e7f2fb;
    }

    .topbar p { margin: 4px 0 0; opacity: 0.8; }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .kpis article {
      background: rgba(14, 165, 164, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 14px;
      padding: 12px;
      color: #e6f6ff;
      display: grid;
      gap: 2px;
    }

    .kpis strong { font-size: 26px; line-height: 1; }
    .kpis span { font-size: 12px; opacity: 0.88; }

    .grid.two {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel { padding: 16px; }
    .panel h3 { margin-bottom: 10px; }

    .list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .list li {
      display: grid;
      gap: 2px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #f7fbff;
    }

    .list small { color: var(--muted); }

    .error-box {
      margin: 10px 0;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #f1c0be;
      color: var(--danger);
      background: #fff1f0;
    }

    .report-block { margin-top: 10px; display: grid; gap: 8px; }

    .reveal { animation: rise 420ms ease-out; }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      .kpis { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.two, .two-col { grid-template-columns: 1fr; }
      .topbar { gap: 10px; flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="/app.jsx"></script>
</body>
</html>
